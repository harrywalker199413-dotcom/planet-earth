<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Earth Photo-Ring • Closer to Reference</title>
  <style>body { margin:0; overflow:hidden; background:#000; }</style>
</head>
<body>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.3, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const light = new THREE.DirectionalLight(0xffffff, 1.4);
light.position.set(5, 5, 5);
scene.add(light);

// 🌍 EARTH (fixed with public texture so it works immediately)
const loader = new THREE.TextureLoader();
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 64, 64),
  new THREE.MeshStandardMaterial({
    map: loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"), // ← works out of the box
    roughness: 0.85,
    metalness: 0.15
  })
);
scene.add(earth);

// 🔄 RING GROUP (same tilt as reference)
const ringGroup = new THREE.Group();
scene.add(ringGroup);
ringGroup.rotation.x = Math.PI / 3.1;   // tuned tilt

// 🖼️ PHOTO RING — now tighter & more continuous
const images = [
  'images/2150804317.jpg',
  'images/52fede5b44dfee94f976b8fa8b840426.jpg',
  'images/70872216903dc3d9f4e8eebafd41afb1.jpg',
  'images/Image-2.png',
  'images/Image-3.png',
  'images/delicious-ice-cream-with-berries (1).jpg',
  'images/delicious-ice-cream-with-topping (1).jpg',
  'images/delicious-ice-cream-with-topping.jpg',
  'images/war-tank-dark-style.jpg'
];

const radius = 2.85;
const numSegments = 24;                    // more = smoother ribbon
const angleStep = (Math.PI * 2) / numSegments;
const ringHeight = 0.82;

for (let i = 0; i < numSegments; i++) {
  const angle = i * angleStep;
  const src = images[i % images.length];

  const texture = loader.load(src);

  const segmentWidth = 2 * radius * Math.sin(angleStep / 2) * 1.08; // overlap for seamless look

  // Main photo
  const photoMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(segmentWidth, ringHeight),
    new THREE.MeshBasicMaterial({
      map: texture,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 1
    })
  );

  photoMesh.position.set(
    Math.cos(angle) * radius,
    0,
    Math.sin(angle) * radius
  );
  photoMesh.rotation.y = -angle + Math.PI / 2;
  ringGroup.add(photoMesh);

  // 🔥 Soft golden glow layer behind each photo (this creates the ribbon effect)
  const glowMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(segmentWidth * 1.18, ringHeight * 1.18),
    new THREE.MeshBasicMaterial({
      color: 0xffdd99,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.45,
      blending: THREE.AdditiveBlending
    })
  );
  glowMesh.position.copy(photoMesh.position);
  glowMesh.rotation.copy(photoMesh.rotation);
  glowMesh.renderOrder = -1; // behind photo
  ringGroup.add(glowMesh);
}

// Thin golden ring (subtle edge glow like reference)
const thinRing = new THREE.Mesh(
  new THREE.TorusGeometry(radius + 0.03, 0.04, 16, 200),
  new THREE.MeshBasicMaterial({ 
    color: 0xffeecc,
    transparent: true,
    opacity: 0.9
  })
);
thinRing.rotation.x = Math.PI / 3.1;
scene.add(thinRing);

// 🎬 ANIMATION
function animate() {
  requestAnimationFrame(animate);

  earth.rotation.y += 0.001;
  ringGroup.rotation.y += 0.0035;
  thinRing.rotation.y += 0.0035;

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
